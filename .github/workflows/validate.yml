name: Validate and build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  static-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Show Python version
        run: python --version

      - name: Validate add-on source contracts
        run: python scripts/validate_addon.py

      - name: Run static contract tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Build deterministic release ZIP
        run: python scripts/build_release.py

      - name: Test ZIP integrity
        run: python -c "import sys, zipfile; p='dist/Dreadstone_Animation_Forge_v3_9_1.zip'; z=zipfile.ZipFile(p); bad=z.testzip(); z.close(); sys.exit(1 if bad else 0)"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: Dreadstone_Animation_Forge_v3_9_1
          path: dist/Dreadstone_Animation_Forge_v3_9_1.zip
          if-no-files-found: error
